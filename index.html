<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeberiXvicha 💰</title>
    <style>
        :root {
            /* 🌑 DARK MODE COLORS (Default) */
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            --input-bg: #0f172a;
            --hero-grad: linear-gradient(135deg, #0ea5e9, #2563eb);
        }

        [data-theme="light"] {
            /* ☀️ LIGHT MODE COLORS */
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #2563eb;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --hero-grad: linear-gradient(135deg, #3b82f6, #1d4ed8);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; justify-content: center; 
            padding: 20px; margin: 0; min-height: 100vh; transition: 0.3s;
        }

        .container { width: 100%; max-width: 480px; }

        /* 💎 HERO TOTAL */
        .hero-card { 
            background: var(--hero-grad); color: white; 
            padding: 40px 20px; border-radius: 28px; text-align: center; 
            margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .total-amount { font-size: 3rem; font-weight: 900; display: block; margin: 10px 0; }
        
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

        .glass-card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
        
        select, input { 
            padding: 12px; background: var(--input-bg); color: var(--text); 
            border: 2px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; 
        }
        select:focus, input:focus { border-color: var(--accent); }

        /* SHIFT ROWS */
        .shift-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px; background: var(--card); border-radius: 18px; 
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        .shift-title { font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .hour-input { width: 60px; text-align: center; font-weight: 800; border-color: var(--border); }

        /* PROGRESS BAR */
        .bar-container { height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 20px; overflow: hidden; display: flex; }
        .bar-b { background: rgba(255,255,255,0.5); height: 100%; transition: 0.7s; }
        .bar-e { background: #fff; height: 100%; transition: 0.7s; }

        /* BUTTONS */
        .btn-group { display: flex; gap: 10px; }
        .btn { cursor: pointer; border: none; border-radius: 12px; font-weight: 700; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-ui { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; }
        .btn-clear { background: #ef4444; color: white; width: 100%; padding: 15px; font-size: 1rem; margin-top: 10px; justify-content: center; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <div class="header-area">
        <div class="logo">BeberiXvicha 🧔</div>
        <div class="btn-group">
            <button class="btn btn-ui" onclick="toggleLang()" id="langBtn">GE</button>
            <button class="btn btn-ui" onclick="toggleTheme()" id="themeBtn">☀️</button>
        </div>
    </div>

    <div class="hero-card">
        <div id="lblFinal" style="font-size: 0.8rem; font-weight: 700; opacity: 0.9;">TOTAL PAYCHECK</div>
        <span class="total-amount" id="totalGEL">0.00 GEL</span>
        <div id="rateInfo" style="font-size: 0.8rem; opacity: 0.8;"></div>
        <div class="bar-container">
            <div id="barBase" class="bar-b"></div>
            <div id="barExtra" class="bar-e"></div>
        </div>
    </div>

    <div class="glass-card">
        <div class="grid">
            <div class="field">
                <label id="lblMonth">📅 Month</label>
                <select id="mSel" onchange="update()"></select>
            </div>
            <div class="field">
                <label id="lblTier">🏅 Tier</label>
                <select id="tSel" onchange="update()">
                    <option value="1297.5">Tier 1</option>
                    <option value="1401.0">Tier 2</option>
                    <option value="1426.9">Tier 3</option>
                </select>
            </div>
        </div>
        <div class="field">
            <label id="lblWork">💼 Work Type</label>
            <select id="wType" onchange="update()">
                <option value="1" id="optFull">Full Time</option>
                <option value="0.5" id="optPart">Part Time</option>
            </select>
        </div>
    </div>

    <div id="rows"></div>

    <button class="btn btn-clear" onclick="clearHours()" id="btnClear">🗑️ Clear All Hours</button>
</div>

<script>
    const months = { "Jan": 144, "Feb": 160, "Mar": 168, "Apr": 152, "May": 152, "Jun": 176, "Jul": 184, "Aug": 160, "Sep": 176, "Oct": 168, "Nov": 160, "Dec": 184 };
    const monthGeo = ["იანვარი", "თებერვალი", "მარტი", "აპრილი", "მაისი", "ივნისი", "ივლისი", "აგვისტო", "სექტემბერი", "ოქტომბერი", "ნოემბერი", "დეკემბერი"];
    const mults = [ {id:'n', l:'Night 🌙', v:1.4}, {id:'o', l:'Overtime ⚡', v:2}, {id:'h', l:'Holiday 🏖️', v:1.25}, {id:'hn', l:'PH Night 🎡', v:1.5} ];
    let currentLang = localStorage.getItem('lang') || 'EN';

    function init() {
        const mS = document.getElementById('mSel');
        let i = 0;
        for (let m in months) {
            mS.innerHTML += `<option value="${months[m]}" data-en="${m}" data-ge="${monthGeo[i]}">${m}</option>`;
            i++;
        }
        const r = document.getElementById('rows');
        mults.forEach(m => {
            r.innerHTML += `<div class="shift-row">
                <div class="shift-title">${m.l} <span style="font-size:0.7rem; color:var(--accent)">${m.v}x</span></div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <input type="number" class="hour-input" id="hrs_${m.id}" value="${localStorage.getItem('hrs_'+m.id)||0}" oninput="update()">
                    <div id="val_${m.id}" style="width:70px; text-align:right; font-weight:900; color:var(--accent);">0.00</div>
                </div>
            </div>`;
        });
        if(localStorage.getItem('theme') === 'light') toggleTheme(true);
        applyLang();
        update();
    }

    function update() {
        const base = parseFloat(document.getElementById('tSel').value);
        const hours = parseFloat(document.getElementById('mSel').value);
        const pct = parseFloat(document.getElementById('wType').value);
        const rate = base / hours;
        const currentBase = base * pct;
        let extra = 0;
        mults.forEach(m => {
            const h = parseFloat(document.getElementById('hrs_'+m.id).value) || 0;
            const earned = h * (rate * m.v);
            document.getElementById('val_'+m.id).innerText = earned.toFixed(2);
            extra += earned;
            localStorage.setItem('hrs_'+m.id, h);
        });
        const total = currentBase + extra;
        document.getElementById('totalGEL').innerText = total.toLocaleString(undefined, {minimumFractionDigits:2}) + " ₾";
        document.getElementById('barBase').style.width = (currentBase / total * 100) + "%";
        document.getElementById('barExtra').style.width = (extra / total * 100) + "%";
        const rateLbl = currentLang === 'EN' ? 'Rate: ' : 'განაკვეთი: ';
        document.getElementById('rateInfo').innerText = `${rateLbl} ${rate.toFixed(4)} GEL`;
    }

    function clearHours() {
        mults.forEach(m => { document.getElementById('hrs_'+m.id).value = 0; localStorage.setItem('hrs_'+m.id, 0); });
        update();
    }

    function toggleTheme(init = false) {
        const b = document.body;
        const isLight = b.getAttribute('data-theme') === 'light';
        if(init || !isLight) {
            if(!init) { b.setAttribute('data-theme', 'light'); localStorage.setItem('theme', 'light'); }
            document.getElementById('themeBtn').innerText = "🌙";
        } else {
            b.removeAttribute('data-theme'); localStorage.setItem('theme', 'dark');
            document.getElementById('themeBtn').innerText = "☀️";
        }
    }

    function toggleLang() {
        currentLang = currentLang === 'EN' ? 'GE' : 'EN';
        localStorage.setItem('lang', currentLang);
        applyLang();
        update();
    }

    function applyLang() {
        const isEn = currentLang === 'EN';
        document.getElementById('langBtn').innerText = isEn ? 'GE' : 'EN';
        document.getElementById('lblFinal').innerText = isEn ? 'TOTAL PAYCHECK' : 'ჯამური ხელფასი';
        document.getElementById('lblMonth').innerText = isEn ? '📅 Month' : '📅 თვე';
        document.getElementById('lblTier').innerText = isEn ? '🏅 Tier' : '🏅 ტარიფი';
        document.getElementById('lblWork').innerText = isEn ? '💼 Work Type' : '💼 განაკვეთი';
        document.getElementById('optFull').innerText = isEn ? 'Full Time' : 'სრული განაკვეთი';
        document.getElementById('optPart').innerText = isEn ? 'Part Time' : 'ნახევარგანაკვეთი';
        document.getElementById('btnClear').innerText = isEn ? '🗑️ Clear All Hours' : '🗑️ გასუფთავება';
        const options = document.getElementById('mSel').options;
        for (let i = 0; i < options.length; i++) {
            options[i].innerText = isEn ? options[i].getAttribute('data-en') : options[i].getAttribute('data-ge');
        }
    }
</script>
</body>
</html>
