<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeberiXvicha 🧔💰</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8;
            --accent: #38bdf8; --border: #334155; --input-bg: #0f172a;
            --hero-grad: linear-gradient(135deg, #0ea5e9, #2563eb);
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --muted: #64748b;
            --accent: #2563eb; --border: #e2e8f0; --input-bg: #f8fafc;
            --hero-grad: linear-gradient(135deg, #3b82f6, #1d4ed8);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; transition: 0.3s; }
        .container { width: 100%; max-width: 480px; }
        .hero-card { background: var(--hero-grad); color: white; padding: 40px 20px; border-radius: 28px; text-align: center; margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .total-amount { font-size: 3rem; font-weight: 900; display: block; margin: 10px 0; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        .glass-card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
        select, input { padding: 12px; background: var(--input-bg); color: var(--text); border: 2px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; transition: 0.2s; }
        select:focus, input:focus { border-color: var(--accent); }
        .shift-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--card); border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); }
        .shift-title { font-weight: 700; font-size: 1rem; }
        .hour-input { width: 65px; text-align: center; font-weight: 800; }
        .bar-container { height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 20px; overflow: hidden; display: flex; }
        .bar-b { background: rgba(255,255,255,0.5); transition: 0.7s; }
        .bar-e { background: #fff; transition: 0.7s; }
        .btn-group { display: flex; gap: 10px; }
        .btn-ui { cursor: pointer; background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 12px; font-weight: 700; }
        .btn-clear { cursor: pointer; background: #ef4444; color: white; width: 100%; padding: 15px; font-size: 1rem; border-radius: 16px; border: none; margin-top: 10px; font-weight: 700; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <div class="header-area">
        <div class="logo">BeberiXvicha 🧔</div>
        <div class="btn-group">
            <button class="btn-ui" onclick="toggleLang()" id="langBtn">GE</button>
            <button class="btn-ui" onclick="toggleTheme()" id="themeBtn">☀️</button>
        </div>
    </div>

    <div class="hero-card">
        <div id="lblFinal" style="font-size: 0.8rem; font-weight: 700; opacity: 0.9;">TOTAL PAYCHECK (NET)</div>
        <span class="total-amount" id="totalGEL">0.00 GEL</span>
        <div id="rateInfo" style="font-size: 0.8rem; opacity: 0.8;"></div>
        <div class="bar-container">
            <div id="barBase" class="bar-b"></div>
            <div id="barExtra" class="bar-e"></div>
        </div>
    </div>

    <div class="glass-card">
        <div class="grid">
            <div class="field">
                <label id="lblRole">👤 Role Type</label>
                <select id="rSel" onchange="updateTiers(); update();">
                    <option value="SA">SA (Support Associate)</option>
                    <option value="SL">SL (Shift Lead)</option>
                </select>
            </div>
            <div class="field">
                <label id="lblTier">🏅 Salary Tier</label>
                <select id="tSel" onchange="update()"></select>
            </div>
        </div>
        <div class="grid">
            <div class="field">
                <label id="lblMonth">📅 Month</label>
                <select id="mSel" onchange="update()"></select>
            </div>
            <div class="field">
                <label id="lblWork">💼 Work Type</label>
                <select id="wType" onchange="update()">
                    <option value="1" id="optFull">Full Time</option>
                    <option value="0.5" id="optPart">Part Time</option>
                </select>
            </div>
        </div>
    </div>

    <div id="rows"></div>

    <button class="btn-clear" onclick="clearHours()" id="btnClear">🗑️ Clear All Hours</button>
</div>

<script>
    const months = { "Jan": 160, "Feb": 160, "Mar": 160, "Apr": 152, "May": 152, "Jun": 168, "Jul": 184, "Aug": 160, "Sep": 176, "Oct": 176, "Nov": 160, "Dec": 184 };
    const monthGeo = ["იანვარი", "თებერვალი", "მარტი", "აპრილი", "მაისი", "ივნისი", "ივლისი", "აგვისტო", "სექტემბერი", "ოქტომბერი", "ნოემბერი", "დეკემბერი"];
    
    const roleTiers = {
        "SA": [
            {l: "Tier 1 (0-6m)", v: 1297.52},
            {l: "Tier 2 (6-12m)", v: 1401.00},
            {l: "Tier 3 (12m+)", v: 1427.00}
        ],
        "SL": [
            {l: "Tier 1 (0-6m)", v: 1687.20},
            {l: "Tier 2 (6m+)", v: 1805.00}
        ]
    };

    const mults = [
        {id:'n', l:'Night 🌙', v:1.4},
        {id:'o', l:'Overtime ⚡', v:2.0},
        {id:'h', l:'Holiday 🏖️', v:1.25},
        {id:'hn', l:'PH Night 🎡', v:1.5}
    ];

    let currentLang = localStorage.getItem('lang') || 'EN';

    function init() {
        const mS = document.getElementById('mSel');
        let i = 0;
        for (let m in months) {
            mS.innerHTML += `<option value="${months[m]}" data-en="${m}" data-ge="${monthGeo[i]}">${m}</option>`;
            i++;
        }
        
        const r = document.getElementById('rows');
        mults.forEach(m => {
            r.innerHTML += `<div class="shift-row">
                <div class="shift-title">${m.l} <span style="font-size:0.7rem; color:var(--accent)">${m.v}x</span></div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <input type="number" class="hour-input" id="hrs_${m.id}" value="${localStorage.getItem('hrs_'+m.id)||0}" oninput="update()">
                    <div id="val_${m.id}" style="width:70px; text-align:right; font-weight:900; color:var(--accent);">0.00</div>
                </div>
            </div>`;
        });

        updateTiers();
        if(localStorage.getItem('theme') === 'light') toggleTheme(true);
        applyLang();
        update();
    }

    function updateTiers() {
        const role = document.getElementById('rSel').value;
        const tSel = document.getElementById('tSel');
        tSel.innerHTML = "";
        roleTiers[role].forEach(t => {
            tSel.innerHTML += `<option value="${t.v}">${t.l}</option>`;
        });
    }

    function update() {
        const netBase = parseFloat(document.getElementById('tSel').value);
        const hoursInMonth = parseFloat(document.getElementById('mSel').value);
        const workType = parseFloat(document.getElementById('wType').value);
        
        // Per your spreadsheet: Additions are calculated on the 100% full base rate
        const hourlyRate = netBase / hoursInMonth;
        const currentSalary = netBase * workType;

        let totalExtra = 0;
        mults.forEach(m => {
            const h = parseFloat(document.getElementById('hrs_'+m.id).value) || 0;
            const earned = h * (hourlyRate * m.v);
            document.getElementById('val_'+m.id).innerText = earned.toFixed(2);
            totalExtra += earned;
            localStorage.setItem('hrs_'+m.id, h);
        });

        const finalNet = currentSalary + totalExtra;
        document.getElementById('totalGEL').innerText = finalNet.toLocaleString(undefined, {minimumFractionDigits:2}) + " ₾";
        
        document.getElementById('barBase').style.width = (currentSalary / finalNet * 100) + "%";
        document.getElementById('barExtra').style.width = (totalExtra / finalNet * 100) + "%";
        
        const rateLbl = currentLang === 'EN' ? 'Hourly (Net): ' : 'საათობრივი: ';
        document.getElementById('rateInfo').innerText = `${rateLbl} ${hourlyRate.toFixed(4)} GEL`;
    }

    function clearHours() {
        mults.forEach(m => { document.getElementById('hrs_'+m.id).value = 0; localStorage.setItem('hrs_'+m.id, 0); });
        update();
    }

    function toggleTheme(init = false) {
        const b = document.body;
        const isLight = b.getAttribute('data-theme') === 'light';
        if(init || !isLight) {
            if(!init) { b.setAttribute('data-theme', 'light'); localStorage.setItem('theme', 'light'); }
            document.getElementById('themeBtn').innerText = "🌙";
        } else {
            b.removeAttribute('data-theme'); localStorage.setItem('theme', 'dark');
            document.getElementById('themeBtn').innerText = "☀️";
        }
    }

    function toggleLang() {
        currentLang = currentLang === 'EN' ? 'GE' : 'EN';
        localStorage.setItem('lang', currentLang);
        applyLang();
        update();
    }

    function applyLang() {
        const isEn = currentLang === 'EN';
        document.getElementById('langBtn').innerText = isEn ? 'GE' : 'EN';
        document.getElementById('lblFinal').innerText = isEn ? 'TOTAL PAYCHECK (NET)' : 'ჯამური ხელფასი (ხელზე)';
        document.getElementById('lblRole').innerText = isEn ? '👤 Role Type' : '👤 პოზიცია';
        document.getElementById('lblTier').innerText = isEn ? '🏅 Salary Tier' : '🏅 ტარიფი';
        document.getElementById('lblMonth').innerText = isEn ? '📅 Month' : '📅 თვე';
        document.getElementById('lblWork').innerText = isEn ? '💼 Work Type' : '💼 განაკვეთი';
        document.getElementById('optFull').innerText = isEn ? 'Full Time' : 'სრული განაკვეთი';
        document.getElementById('optPart').innerText = isEn ? 'Part Time' : 'ნახევარგანაკვეთი';
        document.getElementById('btnClear').innerText = isEn ? '🗑️ Clear All Hours' : '🗑️ გასუფთავება';
        const mOptions = document.getElementById('mSel').options;
        for (let i = 0; i < mOptions.length; i++) {
            mOptions[i].innerText = isEn ? mOptions[i].getAttribute('data-en') : mOptions[i].getAttribute('data-ge');
        }
    }
</script>
</body>
</html>
